version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.prod
    image: myapp-backend:prod
    restart: always
    env_file:
      - ./.env        # 或 .env.prod，根据你的文件名
    ports:
      - "5001:5001"
    environment:
      - ENV=production
      - LOG_LEVEL=warning
      # 其他生产环境变量（从 .env.prod 或 CI 系统注入）

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
    image: myapp-frontend:prod
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

# （可选）网络、卷、机密管理等，按需补充