<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>选择候选蛋白</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='output.css') }}"/>
</head>
<body>
<div class="app-container bg-white rounded-lg shadow-lg mt-10 animate-fade-in p-10">
    <h2 class="text-2xl font-semibold text-blue-800 mb-2">
        疾病：{{ disease }}
    </h2>
    <p class="text-gray-600 mb-6">
        请选择潜在靶点蛋白：
    </p>

    <form action="{{ url_for('candidates') }}" method="post">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for item in proteins %}
            <button
                    type="submit"
                    name="keyword"
                    value="{{ item.protein }}"
                    class="flex flex-col items-start p-6 bg-white border border-gray-200 hover:border-blue-400 transition rounded-lg shadow-sm"
                    onclick="this.querySelector('.spinner').classList.remove('hidden')"
            >
                <div class="flex items-center w-full justify-between">
                    <span class="text-lg font-bold text-blue-800">{{ item.protein }}</span>
                    <svg
                            class="spinner w-5 h-5 text-blue-800 hidden"
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                    >
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
                    </svg>
                </div>
                <p class="mt-2 text-sm text-gray-700">
                    {{ item.description }}
                </p>
            </button>

            {% endfor %}
        </div>
    </form>
</div>
</body>
</html>
